# BrandFlow — Fly.io configuration
# Docs: https://fly.io/docs/reference/configuration/

app = 'brandflow'
primary_region = 'iad'   # Ashburn, VA — good default for global reach

[build]
  # NEXT_PUBLIC_* vars must be available at build time (baked into the bundle).
  # These are intentionally public — safe to commit.
  [build.args]
    NEXT_PUBLIC_SUPABASE_URL        = "https://ycvnqrvcgwvvatzbtqrt.supabase.co"
    NEXT_PUBLIC_SUPABASE_ANON_KEY   = "sb_publishable_W22YHEHc_J0v1XF_idKG0g_FWXUiCPl"
    NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "placeholder"
    NEXT_PUBLIC_APP_URL             = "https://brandflow.fly.dev"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = false   # Keep alive — no cold starts for paying users
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory   = '512mb'
  cpu_kind = 'shared'
  cpus     = 1
